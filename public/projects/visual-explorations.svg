    <radialGradient id="cyan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(690 824) rotate(90) scale(300)">
      <stop stop-color="#66D6EA"/>
      <stop offset="1" stop-color="#66D6EA" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="54" y="818" width="1092" height="292" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="20" result="effect1_foregroundBlur_1_2"/>
